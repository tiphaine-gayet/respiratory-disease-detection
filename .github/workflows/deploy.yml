name: Manual Snowflake Deployment

on:
  push:
    branches:
      - '**'
  workflow_dispatch:
    inputs:
      confirm_deploy:
        description: 'Taper "OUI" pour confirmer le déploiement'
        required: true
        default: 'NON'


env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  lint-and-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # Profites-en pour passer en 3.10+ pour éviter les warnings Boto3
      - name: Install dependencies
        run: pip install snowflake-connector-python
      - name: Syntax Check
        run: python -m py_compile scripts/deploy_infrastructure.py

  deploy-snowflake:
    needs: lint-and-check
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.confirm_deploy == 'OUI'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install snowflake-connector-python
      - name: Deploy Infrastructure
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USERNAME: ${{ secrets.SNOWFLAKE_USERNAME }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
        run: python scripts/deploy_infrastructure.py