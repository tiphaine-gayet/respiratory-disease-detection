name: Manual Snowflake Deployment

on:
  push:
    branches:
      - '**'
  workflow_dispatch: # Doit être au même niveau que 'push'
    inputs:
      confirm_deploy:
        description: 'Taper OUI pour confirmer'
        required: true
        default: 'NON'

env:
  # Force GitHub à utiliser Node 24 pour toutes les actions (v4, v5, etc.)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  lint-and-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Syntax Check
        run: python -m py_compile backend/infra/deploy/deploy_infrastructure.py

  deploy-snowflake:
    needs: lint-and-check
    # Sécurité : exécution manuelle uniquement avec confirmation "OUI"
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.confirm_deploy == 'OUI'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            "snowflake-connector-python>=3.12,<4" \
            "snowflake-snowpark-python==1.26.0" \
            "numpy" \
            "pandas" \
            "scipy" \
            "librosa" \
            "soundfile"

      - name: Deploy Infrastructure
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USERNAME: ${{ secrets.SNOWFLAKE_USERNAME }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
        run: python backend/infra/deploy/deploy_infrastructure.py

      - name: Deploy Audio UDFs (2 files)
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USERNAME }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_DATABASE: M2_ISD_EQUIPE_1_DB
          SNOWFLAKE_SCHEMA: PROCESSED
          SNOWFLAKE_WAREHOUSE: COMPUTE_WH
        run: python backend/infra/deploy/deploy_dual_udfs.py